<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youth Strategy Indicators 2023–2027 · Results Framework Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#EEF1F5;
    --card:#FFFFFF;
    --ink:#16263B;
    --muted:#677488;
    --line:#E2E6ED;
    --navy-1:#0B2240;
    --navy-2:#123A63;

    --c-part:#00B4B0;     /* Participation & Governance */
    --c-part-soft:#00FFAA;
    --c-infra:#8E2DE2;    /* Infrastructure & Info */
    --c-infra-soft:#00FFAA;
    --c-edu:#1565F2;      /* Education */
    --c-edu-soft:#00FFAA;
    --c-emp:#FF7A00;      /* Employment */
    --c-emp-soft:#00FFAA;
    --c-cult:#E8136B;     /* Culture & Risk Behaviours */
    --c-cult-soft:#00FFAA;
    --c-safe:#D62828;     /* Safety & Digital */
    --c-safe-soft:#F8D2D2;

    --base:#C9CFD9;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Manrope',-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* ---------- Header ---------- */
  header.top{
    background:linear-gradient(100deg,var(--navy-1),var(--navy-2));
    color:#fff;
    padding:18px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
    border-bottom:4px solid var(--c-part);
  }
  header.top .eyebrow{
    font-size:11.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:#8FB8E8;
    font-weight:700;
    margin-bottom:6px;
  }
  header.top h1{
    margin:0;
    font-size:26px;
    font-weight:800;
    letter-spacing:-0.01em;
  }
  header.top .meta{
    text-align:right;
    font-size:12.5px;
    color:#B9CCE3;
    line-height:1.5;
  }
  header.top .meta strong{color:#fff;font-weight:700;}

  .header-center{flex:1 1 280px;min-width:220px;}
  .header-side{display:flex;flex-direction:column;align-items:flex-end;gap:9px;flex:0 0 auto;}

  /* logo upload slots 
  .logo-slot{
    width:62px;height:62px;flex:0 0 auto;border-radius:13px;
    border:1.5px dashed rgba(255,255,255,0.35);
    cursor:pointer;overflow:hidden;background:rgba(255,255,255,0.04);
    transition:background .15s,border-color .15s;
  }
  .logo-slot:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.65);}
  .logo-slot:focus-visible{outline:2px solid #fff;outline-offset:2px;}
  .logo-content{
    width:100%;height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;color:rgba(255,255,255,0.6);
  }
  .logo-content img{width:100%;height:100%;object-fit:contain;padding:7px;}
  .logo-ph-text{font-size:8.5px;margin-top:3px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;} */


  /* language switcher */
  .lang-switch{display:flex;gap:3px;background:rgba(255,255,255,0.09);border-radius:20px;padding:3px;}
  .lang-btn{
    appearance:none;border:none;background:transparent;color:#B9CCE3;
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;
    letter-spacing:.04em;padding:5px 11px;border-radius:16px;cursor:pointer;
    transition:background .15s,color .15s;
  }
  .lang-btn:hover{color:#fff;}
  .lang-btn.active{background:var(--c-part);color:#06231F;}
  .lang-btn:focus-visible{outline:2px solid #fff;outline-offset:1px;}

  /* ---------- Tabs ---------- */
  nav.tabs{
    display:flex;
    background:#0E2A4A;
    overflow-x:auto;
    border-bottom:1px solid #0A1E36;
  }
  nav.tabs button{
    appearance:none;
    border:none;
    background:transparent;
    color:#9FB3CC;
    font-family:inherit;
    font-size:13px;
    font-weight:700;
    letter-spacing:.01em;
    padding:13px 20px;
    cursor:pointer;
    white-space:nowrap;
    border-bottom:3px solid transparent;
    transition:background .15s, color .15s, border-color .15s;
  }
  nav.tabs button:hover{ color:#fff; background:rgba(255,255,255,0.06); }
  nav.tabs button:focus-visible{ outline:2px solid #fff; outline-offset:-2px; }
  nav.tabs button.active{
    color:#fff;
    background:var(--tab-color, var(--c-part));
    border-bottom-color:var(--tab-color, var(--c-part));
  }

  /* ---------- Layout ---------- */
  main{padding:22px 26px 60px;max-width:1400px;margin:0 auto;}
  .panel{display:none;}
  .panel.active{display:block;}

  .panel-intro{
    display:flex;
    align-items:baseline;
    gap:12px;
    margin:4px 0 18px;
  }
  .panel-intro h2{
    font-size:18px;
    font-weight:800;
    margin:0;
    color:var(--ink);
  }
  .panel-intro p{
    margin:0;
    font-size:13px;
    color:var(--muted);
  }
  .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(290px, 1fr));
    gap:18px;
  }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 16px 12px;
    box-shadow:0 1px 2px rgba(20,30,50,0.04);
    display:flex;
    flex-direction:column;
    min-height:180px;
  }
  .card .ctitle{
    font-size:14px;
    font-weight:800;
    color:var(--ink);
    margin:0 0 3px;
  }
  .card .csub{
    font-size:11.5px;
    color:var(--muted);
    line-height:1.4;
    margin:0 0 10px;
    min-height:30px;
  }
  .card .chart-wrap{
    position:relative;
    flex:1;
    min-height:110px;
  }
  .card .legend-row{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    font-size:11px;
    color:var(--muted);
    margin-top:8px;
  }
  .card .legend-row span.sw{
    display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:-1px;
  }
  .card .source{
    text-align:right;
    font-size:10.5px;
    font-style:italic;
    color:#9AA5B3;
    margin-top:8px;
  }

  /* big-number donuts */
  .donut-card{align-items:center;}
  .donut-figure{position:relative;width:100%;display:flex;align-items:center;justify-content:center;}
  .donut-figure .center-label{
    position:absolute;
    text-align:center;
    pointer-events:none;
  }
  .donut-figure .center-label .pct{
    font-size:24px;font-weight:800;color:var(--ink);display:block;
  }
  .donut-figure .center-label .yr{
    font-size:10px;color:var(--muted);
  }
  .target-line{
    display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:10px;
    border-top:1px dashed var(--line);padding-top:8px;
  }
  .target-line b{color:var(--ink);font-weight:700;}

  /* milestone stepper */
  .stepper{display:flex;align-items:flex-start;justify-content:space-between;margin-top:18px;}
  .step{flex:1;text-align:center;position:relative;}
  .step .node{
    width:16px;height:16px;border-radius:50%;background:var(--base);
    margin:0 auto 8px;border:3px solid #fff;box-shadow:0 0 0 2px var(--base);
  }
  .step.done .node{background:var(--tab-color);box-shadow:0 0 0 2px var(--tab-color);}
  .step.current .node{background:#fff;box-shadow:0 0 0 3px var(--tab-color);}
  .step:not(:last-child)::after{
    content:'';position:absolute;top:7px;left:58%;right:-42%;height:2px;background:var(--base);z-index:0;
  }
  .step.done:not(:last-child)::after{background:var(--tab-color);}
  .step p{font-size:10.5px;color:var(--muted);margin:0;line-height:1.35;padding:0 4px;}
  .step p.now{color:var(--ink);font-weight:700;}

  /* pending card */
  .pending-card{
    border:1.5px dashed var(--line);
    background:repeating-linear-gradient(135deg, #fff 0 12px, #FAFBFC 12px 24px);
    align-items:center;justify-content:center;text-align:center;
  }
  .pending-card .badge{
    font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    color:var(--tab-color);background:var(--tab-soft);padding:3px 10px;border-radius:20px;margin-bottom:10px;
  }
  .pending-card p{font-size:12.5px;color:var(--muted);margin:4px 0;max-width:230px;}

  footer{
    text-align:center;
    font-size:11.5px;
    color:var(--muted);
    padding:18px 20px 30px;
  }

  @media (max-width:560px){
    header.top{flex-direction:row;flex-wrap:wrap;align-items:center;}
    .header-center{order:2;flex:1 1 100%;}
    .header-center .eyebrow,.header-center h1{text-align:left;}
    header.top .meta{text-align:left;}
    .header-side{order:3;flex:1 1 100%;align-items:flex-start;}
    .grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header class="top">
  <div class="logo-slot" id="logoLeft" tabindex="0" role="button" aria-label="Upload logo">
    <input type="file" accept="image/*" id="logoLeftInput" hidden>
    <div class="logo-content" id="logoLeftContent">
  <img src="RNM.png" alt="Logo">
</div>
  </div>

  <div class="header-center">
    <div class="eyebrow" data-tr="eyebrow">Results Framework · Monitoring Dashboard</div>
    <h1 data-tr="title">Youth Strategy Indicators 2023–2027</h1>
  </div>

  <div class="header-side">
    <div class="lang-switch" role="group" aria-label="Language">
      <button class="lang-btn active" data-lang="en" aria-pressed="true">ENG</button>
      <button class="lang-btn" data-lang="mk" aria-pressed="false">MK</button>
      <button class="lang-btn" data-lang="sq" aria-pressed="false">ALB</button>

    <div class="meta">
      <span data-tr="metaOrg">United Nations Resident Coordinator Office in North Macedonia (UN RCO)</span><br>
      <strong data-tr="metaSub">Baseline – Interim Targets – Final Targets</strong>
    </div>
  </div>

  <div class="logo-slot" id="logoRight" tabindex="0" role="button" aria-label="Upload logo">
    <input type="file" accept="image/*" id="logoRightInput" hidden>
    <div class="logo-content" id="logoLeftContent">
  <img src="image.png" alt="Logo">
</div>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>

<main id="panels"></main>

<footer data-tr="footer">
  Indicator baselines and targets sourced from the National Youth Strategy 2023–2027 Results Framework ·

<script>
/* =========================================================

const UI = {

let currentLang = 'en';
function t(key){ return UI[currentLang][key]; }
function tx(obj, key){ return (obj.i18n && obj.i18n[currentLang] && obj.i18n[currentLang][key] !== undefined) ? obj.i18n[currentLang][key] : obj[key]; }

function applyStaticTranslations(){
  document.documentElement.lang = currentLang;
  document.querySelectorAll('[data-tr]').forEach(el=>{
    el.textContent = t(el.dataset.tr);
  });
}

/* =========================================================

   ========================================================= */

      mk:{ label:'Вработување', blurb:'Резултати на пазарот на труд за младите луѓе на возраст од 15–29 години.' },

/* indicator chart "kind": bar3 | donut | grouped | stepper | pending
   bar3 / grouped indicators carry baseYear — the year-labels are built
   dynamically (e.g. "2022 Baseline · 2025 Interim Target · 2027 Target") */
const indicators = {
  participation:[
    { kind:'bar3', title:'Functional Local Youth Councils',

      i18n:{

        sq:{ title:'Pjesëmarrja Elektronike e të Rinjve me Autoritetet',

    { kind:'donut', title:'Digital Skills Among Youth',

/* =========================================================
   RENDER: tabs + panel shells (rebuilt on language switch)
   ========================================================= */
const tabsEl = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');
let renderedPanels = new Set();
let activeCatId = categories[0].id;
const chartRegistry = {};

function buildShell(){
  tabsEl.innerHTML = '';
  panelsEl.innerHTML = '';
  renderedPanels = new Set();

  categories.forEach((cat)=>{
    const btn = document.createElement('button');
    btn.textContent = tx(cat,'label');
    btn.style.setProperty('--tab-color', cat.cssColor);
    if(cat.id===activeCatId) btn.classList.add('active');
    btn.addEventListener('click',()=>activate(cat.id));
    tabsEl.appendChild(btn);

    const panel = document.createElement('section');
    panel.className = 'panel'+(cat.id===activeCatId?' active':'');
    panel.id = 'panel-'+cat.id;
    panel.innerHTML = `
      <div class="panel-intro">
        <span class="dot" style="background:${cat.cssColor}"></span>
        <h2>${tx(cat,'label')}</h2>
        <p>— ${tx(cat,'blurb')}</p>
      </div>
      <div class="grid" id="grid-${cat.id}"></div>
    `;
    panelsEl.appendChild(panel);
  });

  renderPanel(activeCatId);
  renderedPanels.add(activeCatId);
}

function activate(id){
  activeCatId = id;
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const idx = categories.findIndex(c=>c.id===id);
  document.querySelectorAll('nav.tabs button')[idx].classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
  if(!renderedPanels.has(id)){
    renderPanel(id);
    renderedPanels.add(id);
  }
}

/* labels shown on bar3 / grouped charts, built from baseYear + current language */
function targetLabels(ind){
  return [
    `${ind.baseYear} ${t('baselineWord')}`,
    `2025 ${t('interimTargetWord')}`,
    `2027 ${t('targetWord')}`,
  ];
}

function makeChart(id, config){
  if(chartRegistry[id]){ chartRegistry[id].destroy(); }
  chartRegistry[id] = new Chart(document.getElementById(id), config);
}

/* =========================================================
   RENDER: cards per panel
   ========================================================= */
function renderPanel(catId){
  const cat = categories.find(c=>c.id===catId);
  const grid = document.getElementById('grid-'+catId);
  const list = indicators[catId];

  list.forEach((ind,idx)=>{
    const cardId = catId+'-'+idx;
    const card = document.createElement('div');
    card.className = 'card' + (ind.kind==='donut' ? ' donut-card' : '') + (ind.kind==='pending' ? ' pending-card' : '');
    card.style.setProperty('--tab-color', cat.cssColor);
    card.style.setProperty('--tab-soft', cat.soft);

    if(ind.kind==='pending'){
      card.innerHTML = `
        <div class="badge">${t('baselinePending')}</div>
        <p class="ctitle" style="margin-top:4px">${tx(ind,'title')}</p>
        <p>${tx(ind,'note')}</p>
        <div class="source">${t('source')} ${tx(ind,'source')}</div>
      `;
      grid.appendChild(card);
      return;
    }

    if(ind.kind==='stepper'){
      const steps = tx(ind,'steps');
      card.innerHTML = `
        <p class="ctitle">${tx(ind,'title')}</p>
        <p class="csub">${tx(ind,'sub')}</p>
        <div class="stepper">
          ${steps.map((s,i)=>`
            <div class="step ${i<ind.current?'done':''} ${i===ind.current?'current':''}">
              <div class="node"></div>
              <p class="${i===ind.current?'now':''}">${s}</p>
            </div>`).join('')}
        </div>
        <div class="source">${t('source')} ${tx(ind,'source')}</div>
      `;
      grid.appendChild(card);
      return;
    }

    if(ind.kind==='donut'){
      card.innerHTML = `
        <p class="ctitle">${tx(ind,'title')}</p>
        <p class="csub">${tx(ind,'sub')}</p>
        <div class="chart-wrap donut-figure">
          <canvas id="${cardId}"></canvas>
          <div class="center-label">
            <span class="pct">${ind.value}${ind.unit}</span>
            <span class="yr">${ind.year}</span>
          </div>
        </div>
        <div class="target-line">
          <span>${t('interimTargetWord')} 2025: <b>${ind.mid}${ind.unit}</b></span>
          <span>${t('finalTargetWord')} 2027: <b>${ind.final}${ind.unit}</b></span>
        </div>
        <div class="source">${t('source')} ${tx(ind,'source')}</div>
      `;
      grid.appendChild(card);
      makeChart(cardId, {
        type:'doughnut',
        data:{
          labels:['Current','Remaining'],
          datasets:[{
            data: ind.unit==='%' ? [ind.value, Math.max(0,100-ind.value)] : [ind.value, 0],
            backgroundColor:[cat.cssColor, '#EDEFF3'],
            borderWidth:0,
          }]
        },
        options:{
          cutout:'72%',
          plugins:{ legend:{display:false}, tooltip:{enabled:false} },
          animation:{ duration:600 },
        }
      });
      return;
    }

    if(ind.kind==='bar3'){
      const labels = targetLabels(ind);
      card.innerHTML = `
        <p class="ctitle">${tx(ind,'title')}</p>
        <p class="csub">${tx(ind,'sub')}${ind.note? ' <em>('+tx(ind,'note')+')</em>':''}</p>
        <div class="chart-wrap"><canvas id="${cardId}"></canvas></div>
        <div class="source">${t('source')} ${tx(ind,'source')}</div>
      `;
      grid.appendChild(card);
      const palette = [ '#C9CFD9', shade(cat.cssColor,0.55), cat.cssColor ];
      makeChart(cardId, {
        type:'bar',
        data:{
          labels: labels,
          datasets:[{
            data: ind.values,
            backgroundColor: palette,
            borderRadius:6,
            maxBarThickness:54,
          }]
        },
        options:{
          plugins:{ legend:{display:false},
            tooltip:{ callbacks:{ label:(c)=> c.parsed.y.toLocaleString()+ (ind.unit||'') } } },
          scales:{
            y:{ beginAtZero:true, max: ind.max||undefined, grid:{color:'#EEF1F5'}, ticks:{ font:{size:10}, callback:(v)=>v.toLocaleString() } },
            x:{ grid:{display:false}, ticks:{ font:{size:10.5} } }
          },
          animation:{ duration:600 }
        }
      });
      return;
    }

    if(ind.kind==='grouped'){
      const labels = targetLabels(ind);
      const groups = tx(ind,'groups');
      card.innerHTML = `
        <p class="ctitle">${tx(ind,'title')}</p>
        <p class="csub">${tx(ind,'sub')}${ind.midNote? ' <em>('+tx(ind,'midNote')+')</em>':''}</p>
        <div class="chart-wrap"><canvas id="${cardId}"></canvas></div>
        <div class="legend-row">
          <span><span class="sw" style="background:#C9CFD9"></span>${labels[0]}</span>
          <span><span class="sw" style="background:${shade(cat.cssColor,0.55)}"></span>${labels[1]}</span>
          <span><span class="sw" style="background:${cat.cssColor}"></span>${labels[2]}</span>
        </div>
        <div class="source">${t('source')} ${tx(ind,'source')}</div>
      `;
      grid.appendChild(card);
      makeChart(cardId, {
        type:'bar',
        data:{
          labels: groups,
          datasets:[
            { label:labels[0], data: ind.baseline, backgroundColor:'#C9CFD9', borderRadius:5, maxBarThickness:26 },
            { label:labels[1], data: ind.mid, backgroundColor:shade(cat.cssColor,0.55), borderRadius:5, maxBarThickness:26 },
            { label:labels[2], data: ind.final, backgroundColor:cat.cssColor, borderRadius:5, maxBarThickness:26 },
          ]
        },
        options:{
          plugins:{ legend:{display:false},
            tooltip:{ callbacks:{ label:(c)=> c.dataset.label+': '+c.parsed.y+(ind.unit||'') } } },
          scales:{
            y:{ beginAtZero:true, grid:{color:'#EEF1F5'}, ticks:{ font:{size:10} } },
            x:{ grid:{display:false}, ticks:{ font:{size:10} } }
          },
          animation:{ duration:600 }
        }
      });
      return;
    }
  });
}

function shade(hex, amt){
  // lighten a hex color toward white by amt (0-1)
  const c = hex.replace('#','');
  const r = parseInt(c.substring(0,2),16), g = parseInt(c.substring(2,4),16), b = parseInt(c.substring(4,6),16);
  const nr = Math.round(r + (255-r)*amt);
  const ng = Math.round(g + (255-g)*amt);
  const nb = Math.round(b + (255-b)*amt);
  return `rgb(${nr},${ng},${nb})`;
}
